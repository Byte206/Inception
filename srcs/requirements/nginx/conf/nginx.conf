# ===== CONFIGURACIÓN DEL SERVIDOR NGINX =====
server {
    # Escucha en puerto 443 con SSL/TLS para IPv4 e IPv6
    listen 443 ssl;
    listen [::]:443 ssl;

    # Define el nombre del dominio del servidor
    server_name __DOMAIN_NAME__;

    # ===== CONFIGURACIÓN SSL/TLS =====
    # Ruta al certificado SSL
    ssl_certificate /etc/nginx/ssl/inception.crt;
    # Ruta a la clave privada SSL
    ssl_certificate_key /etc/nginx/ssl/inception.key;
    # Usa solo TLS 1.2 (versión segura)
    ssl_protocols TLSv1.2;
    # Prefiere los cifrados del servidor para mayor seguridad
    ssl_prefer_server_ciphers on;

    # ===== RAÍZ Y ÍNDICE =====
    # Directorio raíz donde se encuentran los archivos de WordPress
    root /var/www/html;
    # Archivos índice (index.php para WordPress, index.html como fallback)
    index index.php index.html;

    # ===== REGLA DE REESCRITURA PARA URLS AMIGABLES =====
    location / {
        # Intenta servir el archivo/directorio solicitado, si no existe pasa a index.php
        # Esto permite que WordPress maneje las URLs amigables (permalinks)
        try_files $uri $uri/ /index.php?$args;
    }

    # ===== PROCESAMIENTO DE ARCHIVOS PHP =====
    # Procesa archivos que terminan en .php
    location ~ \.php$ {
        # Incluye parámetros FastCGI estándar
        include /etc/nginx/fastcgi_params;
        # Pasa las peticiones PHP al contenedor wordpress en puerto 9000 (php-fpm)
        fastcgi_pass wordpress:9000;
        # Define el archivo índice para FastCGI
        fastcgi_index index.php;
        # Define la ruta del archivo script a ejecutar
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ===== BLOQUEO DE ARCHIVOS HTACCESS =====
    # Bloquea el acceso a archivos .ht (como .htaccess) por seguridad
    location ~ /\.ht {
        deny all;
    }
}